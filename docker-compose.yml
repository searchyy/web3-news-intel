services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: web3_news
      POSTGRES_PASSWORD: web3_news
      POSTGRES_DB: web3_news_intel
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U web3_news -d web3_news_intel"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://web3_news:web3_news@postgres:5432/web3_news_intel
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${APP_PORT:-18080}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  ai-worker:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://web3_news:web3_news@postgres:5432/web3_news_intel
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    command: >
      celery -A app.workers.celery_app worker
      --hostname=ai-worker@%h
      --loglevel=INFO
      --pool=threads
      --concurrency=${AI_WORKER_CONCURRENCY:-2}
      --queues=ai
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A app.workers.celery_app inspect ping -d ai-worker@$$(hostname) | grep -q pong",
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 20s

  report-worker:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://web3_news:web3_news@postgres:5432/web3_news_intel
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    command: >
      celery -A app.workers.celery_app worker
      --hostname=report-worker@%h
      --loglevel=INFO
      --pool=solo
      --concurrency=1
      --queues=report
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A app.workers.celery_app inspect ping -d report-worker@$$(hostname) | grep -q pong",
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 20s

  fetch-worker:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://web3_news:web3_news@postgres:5432/web3_news_intel
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    command: >
      celery -A app.workers.celery_app worker
      --hostname=fetch-worker@%h
      --loglevel=INFO
      --pool=threads
      --concurrency=${FETCH_WORKER_CONCURRENCY:-8}
      --queues=fetch
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A app.workers.celery_app inspect ping -d fetch-worker@$$(hostname) | grep -q pong",
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 20s

  pipeline-worker:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://web3_news:web3_news@postgres:5432/web3_news_intel
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    command: >
      celery -A app.workers.celery_app worker
      --hostname=pipeline-worker@%h
      --loglevel=INFO
      --pool=threads
      --concurrency=${PIPELINE_WORKER_CONCURRENCY:-4}
      --queues=pipeline,web3-news-intel
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A app.workers.celery_app inspect ping -d pipeline-worker@$$(hostname) | grep -q pong",
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 20s

  scheduler:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://web3_news:web3_news@postgres:5432/web3_news_intel
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    command: >
      sh -c "touch /tmp/scheduler-ready &&
             celery -A app.workers.celery_app beat --loglevel=INFO"
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/scheduler-ready"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-18081}:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  postgres_data:
