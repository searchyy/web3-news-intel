ranking_snapshot:
  ranking_provider: CoinGecko Trust Score
  ranking_snapshot_at: "2026-06-21"
  note: "初始 Top 10 快照仅用于本版本 source catalog 种子，不代表永久排名。"

defaults:
  source_group: exchange_official
  source_type: exchange_official
  official: true
  poll_seconds: 30
  timeout_seconds: 15
  maximum_response_bytes: 2097152
  max_items_per_fetch: 20
  live_canary_max_items: 10
  supported_categories:
    - listing
    - delisting
    - derivatives_listing
    - derivatives_delisting
    - wallet_maintenance
    - deposit_withdrawal
    - system_maintenance
    - security_incident
    - trading_rule
    - product
    - regulatory

