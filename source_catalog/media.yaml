version: 1
ranking_snapshot_at: "2026-06-21"
policy:
  copyright_mode: metadata_summary_link_only
  allowed_fields:
    - title
    - summary
    - published_at
    - author
    - tags
    - original_url
  disallowed_fields:
    - full_article_body
    - raw_html
    - login_cookie
    - private_header
    - paywalled_content
  confirmation_rule: "媒体报道默认不是官方确认；重大事件需要多来源聚类或官方来源确认。"

sources:
  blockbeats_newsflash:
    key: blockbeats_newsflash
    name: BlockBeats Newsflash
    display_name_zh: 律动 BlockBeats 快讯
    source_group: media_zh
    source_type: chinese_media
    adapter: media_html
    parser: blockbeats_newsflash_html
    official: false
    language: zh
    category: newsflash
    trust_score: 68
    poll_seconds: 30
    timeout_seconds: 15
    maximum_response_bytes: 1048576
    max_items_per_fetch: 20
    enabled: true
    url: https://m.theblockbeats.info/newsflash
    canonical_url: https://m.theblockbeats.info/newsflash
    parser_version: blockbeats_newsflash_html_v1
    supported_categories:
      - newsflash
      - market
      - funding
      - policy_regulatory
      - hack_security
      - project_update
      - token_unlock
      - onchain
      - exchange_repost
    live_canary_status: NOT_EXECUTED
    last_canary_at:
    last_canary_error:
    known_limitations: "使用公开快讯列表页，仅解析标题、摘要、时间、标签和链接。"
    config:
      item_selector: "a[href^='/flash/']"
      title_selector: ".news-flash-title-text"
      url_selector: "a[href^='/flash/']"
      summary_selector: ".news-flash-item-content"
      date_group_selector: ".flash-list"
      date_group_label_selector: ".flash-list-today"
      parser_version: blockbeats_newsflash_html_v1
      source_group: media_zh
      official: false
      max_items: 20

