policy:
  copyright_mode: metadata_summary_link_only
  disallowed_fields:
    - full_article_body
    - paywalled_content
    - private_channel_content
  default_requires_multisource_confirmation: true

sources:
  aster_medium:
    name: Aster Medium
    display_name_zh: Aster Official Medium
    source_group: project_official
    source_type: project_official
    adapter: media_rss
    parser: media_rss
    official: true
    language: en
    category: project_update
    trust_score: 88
    poll_seconds: 30
    timeout_seconds: 15
    maximum_response_bytes: 1048576
    max_items_per_fetch: 20
    enabled: true
    url: https://medium.com/feed/asterdex
    canonical_url: https://medium.com/asterdex
    parser_version: aster_medium_rss_v1
    supported_categories: [project_update, market, token_unlock, exchange_repost]
    live_canary_status: NOT_RUN
    last_canary_at:
    last_canary_error:
    known_limitations: "Official Medium feed; captures Aster project announcements/articles, not third-party exchange listing bulletins."
    config:
      parser_version: aster_medium_rss_v1
      source_group: project_official
      official: true
      max_items: 20

  aster_product_releases:
    name: Aster Product Releases
    display_name_zh: Aster Product Releases
    source_group: project_official
    source_type: project_official
    adapter: media_html
    parser: aster_product_releases_html
    official: true
    language: en
    category: project_update
    trust_score: 86
    poll_seconds: 30
    timeout_seconds: 20
    maximum_response_bytes: 2097152
    max_items_per_fetch: 20
    enabled: true
    url: https://docs.asterdex.com/trading/product-releases
    canonical_url: https://docs.asterdex.com/trading/product-releases
    parser_version: aster_product_releases_html_v1
    supported_categories: [project_update, market, token_unlock, exchange_repost]
    live_canary_status: NOT_RUN
    last_canary_at:
    last_canary_error:
    known_limitations: "Official GitBook docs page; releases are grouped by week, so published_at is the week-start date from the page."
    config:
      parser: aster_product_releases_html
      parser_version: aster_product_releases_html_v1
      source_group: project_official
      official: true
      max_items: 20

  aster_api_docs_commits:
    name: Aster API Docs Commits
    display_name_zh: Aster API Docs Commits
    source_group: project_official
    source_type: project_official
    adapter: media_rss
    parser: media_rss
    official: true
    language: en
    category: project_update
    trust_score: 82
    poll_seconds: 30
    timeout_seconds: 15
    maximum_response_bytes: 1048576
    max_items_per_fetch: 10
    enabled: true
    url: https://github.com/asterdex/api-docs/commits/master.atom
    canonical_url: https://github.com/asterdex/api-docs
    parser_version: aster_api_docs_commits_atom_v1
    supported_categories: [project_update]
    live_canary_status: NOT_RUN
    last_canary_at:
    last_canary_error:
    known_limitations: "Official API documentation repository commit feed; useful for API/doc changes, not marketing announcements."
    config:
      parser_version: aster_api_docs_commits_atom_v1
      source_group: project_official
      official: true
      max_items: 10

  hyperliquid_telegram_announcements:
    name: Hyperliquid Announcements
    display_name_zh: Hyperliquid Announcements
    source_group: project_official
    source_type: project_official
    adapter: media_html
