    poll_seconds: 30
    timeout_seconds: 15
    maximum_response_bytes: 1048576
    max_items_per_fetch: 5
    enabled: true
    url: https://status.backpack.exchange/
    canonical_url: https://status.backpack.exchange/
    parser_version: backpack_status_html_v1
    supported_categories: [system_maintenance]
    live_canary_status: NOT_RUN
    last_canary_at:
    last_canary_error:
    known_limitations: "Official status page; emits an item only when the page is not all-green."
    config:
      parser: betterstack_status_html
      parser_version: backpack_status_html_v1
      source_group: project_official
