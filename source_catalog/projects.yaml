  hyperliquid_news_search:
    name: Hyperliquid/HYPE News Search
    display_name_zh: Hyperliquid/HYPE News Search
    source_group: project_news
    source_type: news_aggregator
    adapter: media_rss
    parser: media_rss
    official: false
    language: en
    category: market
    trust_score: 55
    poll_seconds: 30
    timeout_seconds: 15
    maximum_response_bytes: 1048576
    max_items_per_fetch: 20
    enabled: true
    url: "https://news.google.com/rss/search?q=Hyperliquid%20OR%20HYPE%20crypto&hl=en-US&gl=US&ceid=US:en"
    canonical_url: "https://news.google.com/search?q=Hyperliquid%20OR%20HYPE%20crypto"
    parser_version: google_news_rss_v1
    supported_categories: [market, project_update, exchange_repost, policy_regulatory, hack_security]
    live_canary_status: NOT_RUN
    last_canary_at:
    last_canary_error: "Google News RSS was not promoted to enabled because local canary did not return a complete response through the current proxy path."
    known_limitations: "Third-party news aggregator, not an official Hyperliquid announcement channel."
    config:
      parser_version: google_news_rss_v1
      source_group: project_news
      official: false
      validate_dns_rebinding: false
      request_headers:
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36
        Accept-Language: en-US,en;q=0.9
      max_items: 20

