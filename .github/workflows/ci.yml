name: CI

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTEST_FAIL_ON_SKIP: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: mkdir -p artifacts
      - run: python -m pip install --upgrade pip
        timeout-minutes: 2
      - run: python -m pip install -e ".[dev]"
        timeout-minutes: 5
      - run: python -m ruff check .
        timeout-minutes: 2
      - run: python -m mypy app
        timeout-minutes: 3
      - run: python -m pytest tests/unit -q --junitxml=artifacts/unit.xml
        timeout-minutes: 5
      - run: >
          python -m pytest tests/integration -q
          -m "not postgres and not redis and not celery and not compose and not live"
          --junitxml=artifacts/integration-fixture.xml
        timeout-minutes: 5
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-artifacts
          path: artifacts

  frontend-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        timeout-minutes: 5
      - run: npm run lint
        timeout-minutes: 3
      - run: npm run typecheck
        timeout-minutes: 3
      - run: npm run test
        timeout-minutes: 5
      - run: npm run build
        timeout-minutes: 5

  postgres-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: web3_news
          POSTGRES_PASSWORD: web3_news
          POSTGRES_DB: web3_news_intel
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U web3_news -d web3_news_intel"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql+psycopg://web3_news:web3_news@localhost:5432/web3_news_intel
      TEST_DATABASE_URL: postgresql+psycopg://web3_news:web3_news@localhost:5432/web3_news_intel
      ACCEPTANCE_ARTIFACT_DIR: artifacts
      PYTEST_FAIL_ON_SKIP: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: mkdir -p artifacts
      - run: python -m pip install --upgrade pip
        timeout-minutes: 2
      - run: python -m pip install -e ".[dev]"
        timeout-minutes: 5
      - name: Record PostgreSQL status
        run: |
          set -o pipefail
          python - <<'PY' 2>&1 | tee artifacts/postgres-status.log
          import os
          import time
          import psycopg

          deadline = time.monotonic() + 30
          while True:
              try:
                  with psycopg.connect(os.environ["DATABASE_URL"].replace("postgresql+psycopg://", "postgresql://"), connect_timeout=3) as conn:
                      with conn.cursor() as cur:
                          cur.execute("select version()")
                          print(cur.fetchone()[0])
                      break
              except Exception as exc:
                  if time.monotonic() >= deadline:
                      raise
                  print(f"waiting for postgres: {exc}")
                  time.sleep(1)
          PY
        timeout-minutes: 1
      - run: set -o pipefail && alembic upgrade head 2>&1 | tee artifacts/alembic-upgrade-1.log
        timeout-minutes: 2
      - run: set -o pipefail && alembic current --check-heads 2>&1 | tee artifacts/alembic-current-1.log
        timeout-minutes: 1
      - run: set -o pipefail && alembic check 2>&1 | tee artifacts/alembic-check.log
        timeout-minutes: 2
      - run: >
          python -m pytest tests/integration -q -m postgres
          --junitxml=artifacts/postgres-1.xml
        timeout-minutes: 10
      - run: test -s artifacts/search-performance.json && test -s artifacts/search-performance.md
        timeout-minutes: 1
      - run: set -o pipefail && alembic downgrade -1 2>&1 | tee artifacts/alembic-downgrade.log
        timeout-minutes: 2
      - run: set -o pipefail && alembic upgrade head 2>&1 | tee artifacts/alembic-upgrade-2.log
        timeout-minutes: 2
      - run: set -o pipefail && alembic current --check-heads 2>&1 | tee artifacts/alembic-current-2.log
        timeout-minutes: 1
      - run: >
          python -m pytest tests/integration -q -m postgres
          --junitxml=artifacts/postgres-2.xml
        timeout-minutes: 10
      - run: test -s artifacts/search-performance.json && test -s artifacts/search-performance.md
        timeout-minutes: 1
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postgres-integration-artifacts
          path: artifacts

  redis-celery-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: web3_news
          POSTGRES_PASSWORD: web3_news
          POSTGRES_DB: web3_news_intel
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U web3_news -d web3_news_intel"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      APP_ENV: test
      ENABLE_ACCEPTANCE_TASKS: "true"
      DATABASE_URL: postgresql+psycopg://web3_news:web3_news@localhost:5432/web3_news_intel
      TEST_DATABASE_URL: postgresql+psycopg://web3_news:web3_news@localhost:5432/web3_news_intel
      REDIS_URL: redis://localhost:6379/0
      TEST_REDIS_URL: redis://localhost:6379/0
      RUN_CELERY_WORKER_TESTS: "1"
      CELERY_REDIS_VISIBILITY_TIMEOUT_SECONDS: "5"
      CELERY_LOG_DIR: artifacts/celery
      PYTEST_FAIL_ON_SKIP: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: mkdir -p artifacts/celery
      - run: python -m pip install --upgrade pip
        timeout-minutes: 2
      - run: python -m pip install -e ".[dev]"
        timeout-minutes: 5
      - name: Record Redis status
        run: |
          set -o pipefail
          python - <<'PY' 2>&1 | tee artifacts/redis-status.log
          import os
          import time
          import redis

          deadline = time.monotonic() + 30
          client = redis.Redis.from_url(os.environ["REDIS_URL"])
          while True:
              try:
                  print(client.ping())
                  break
              except Exception as exc:
                  if time.monotonic() >= deadline:
                      raise
                  print(f"waiting for redis: {exc}")
                  time.sleep(1)
          PY
        timeout-minutes: 1
      - run: set -o pipefail && alembic upgrade head 2>&1 | tee artifacts/alembic-upgrade.log
        timeout-minutes: 2
      - run: >
          python -m pytest tests/integration -q -m "redis or celery"
          --junitxml=artifacts/redis-celery.xml
        timeout-minutes: 15
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redis-celery-integration-artifacts
          path: artifacts

  compose-acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      COMPOSE_FILE: docker-compose.yml:docker-compose.acceptance.yml
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p artifacts
      - run: cp .env.example .env
      - run: docker compose config --quiet
        timeout-minutes: 2
      - run: docker compose build
        timeout-minutes: 8
      - run: docker compose up -d
        timeout-minutes: 5
      - name: Wait for Compose service health
        run: >
          python scripts/wait_compose_healthy.py --timeout 240
          --services postgres,redis,mock-deepseek,mock-feishu,api,worker,scheduler,frontend
        timeout-minutes: 4
      - name: Check API health
        run: |
          curl --fail --show-error --silent http://127.0.0.1:18080/health | tee artifacts/api-health.json
        timeout-minutes: 3
      - name: Check frontend health
        run: curl --fail --show-error --silent http://127.0.0.1:18081/health | tee artifacts/frontend-health.txt
        timeout-minutes: 1
      - name: Check frontend login page
        run: curl --fail --show-error --silent http://127.0.0.1:18081/login | grep -q "Web3 News Intel"
        timeout-minutes: 1
      - run: curl --fail --show-error --silent http://127.0.0.1:18080/metrics > artifacts/metrics.txt
        timeout-minutes: 1
      - run: docker compose exec -T api alembic current --check-heads
        timeout-minutes: 1
      - run: docker compose exec -T api python scripts/validate_sources.py sources.yaml
        timeout-minutes: 2
      - name: Run full Compose mock E2E
        run: >
          docker compose exec -T api python scripts/compose_full_mock_e2e.py
          | tee artifacts/compose-full-mock-e2e.json
        timeout-minutes: 6
      - run: docker compose ps
        timeout-minutes: 1
      - if: always()
        run: docker compose ps > artifacts/compose-ps.txt || true
      - if: always()
        run: docker compose logs --no-color > artifacts/compose.log || true
      - if: always()
        run: docker compose down -v --remove-orphans
        timeout-minutes: 3
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-acceptance-artifacts
          path: artifacts
