name: AI Integration Mock

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ai-integration-mock:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: web3_news
          POSTGRES_PASSWORD: web3_news
          POSTGRES_DB: web3_news_intel
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U web3_news -d web3_news_intel"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      APP_ENV: test
      AI_ENABLED: "true"
      AI_AUTO_PROCESS_ENABLED: "false"
      AI_PROVIDER: deepseek
      DEEPSEEK_API_BASE: https://api.deepseek.com
      DEEPSEEK_DAILY_TOKEN_BUDGET: "0"
      FEISHU_SEND_ENABLED: "false"
      DATABASE_URL: postgresql+psycopg://web3_news:web3_news@localhost:5432/web3_news_intel
      TEST_DATABASE_URL: postgresql+psycopg://web3_news:web3_news@localhost:5432/web3_news_intel
      REDIS_URL: redis://localhost:6379/0
      TEST_REDIS_URL: redis://localhost:6379/0
      PYTEST_FAIL_ON_SKIP: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: mkdir -p artifacts
      - run: python -m pip install --upgrade pip
        timeout-minutes: 2
      - run: python -m pip install -e ".[dev]"
        timeout-minutes: 5
      - run: alembic upgrade head
        timeout-minutes: 2
      - name: Run DeepSeek and Feishu mock tests
        run: >
          python -m pytest tests/unit tests/integration
          -q
          -m "not redis and not celery"
          -k "ai or deepseek or prompt or budget or feishu_report or report_schedule"
          --junitxml=artifacts/ai-integration-mock.xml
        timeout-minutes: 10
      - name: Security acceptance snapshot
        run: python scripts/security_acceptance.py --json-out artifacts/security-acceptance.json
        timeout-minutes: 2
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-integration-mock-artifacts
          path: artifacts
