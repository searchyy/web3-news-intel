name: Live Source Canary

permissions:
  contents: read

on:
  schedule:
    - cron: "17 */12 * * *"
  workflow_dispatch:

jobs:
  live-source-canary:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: mkdir -p artifacts
      - run: python -m pip install --upgrade pip
        timeout-minutes: 2
      - run: python -m pip install -e ".[dev]"
        timeout-minutes: 5
      - run: python scripts/live_source_canary.py --sources-file sources.yaml > artifacts/live-source-canary.json
        timeout-minutes: 5
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-source-canary-artifacts
          path: artifacts
